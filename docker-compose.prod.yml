# Production-style stack: Postgres, Redis, Gunicorn+Uvicorn API, Streamlit, nginx (TLS + /v1 API key map).
#
# Required env (file or shell): API_KEY, DB_PASS
# Optional: FMCSA_KEY or FMCSA_WEB_KEY, FMCSA_WEB_KEY, DASHBOARD_ENTRY_URL
#
# Up:   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build
# TLS:  https://localhost  (trust self-signed). API: /v1/...  Dashboard: /dashboard/

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: ${DB_PASS:?Set DB_PASS (Postgres password)}
      POSTGRES_DB: freight
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight -d freight"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://freight:${DB_PASS}@postgres:5432/freight
      API_KEY: ${API_KEY:?Set API_KEY}
      REDIS_URL: redis://redis:6379/0
      FMCSA_KEY: ${FMCSA_KEY:-}
      FMCSA_WEB_KEY: ${FMCSA_WEB_KEY:-}
      DASHBOARD_ENTRY_URL: ${DASHBOARD_ENTRY_URL:-https://localhost/dashboard/}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: streamlit
    restart: unless-stopped
    expose:
      - "8501"
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
      API_METRICS_PATH: /v1/metrics
      API_KEY: ${API_KEY:?Set API_KEY}

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - api
      - streamlit
    environment:
      API_KEY: ${API_KEY:?Set API_KEY}

volumes:
  pgdata:
